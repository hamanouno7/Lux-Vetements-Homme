<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produit — LUX vêtements</title>
  <link rel="stylesheet" href="css/site.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-wrap">
      <button class="menu-btn" id="menuBtn" type="button" aria-label="Menu"><span></span></button>
      <a class="logo" href="index.html">
        <img src="logo-lux.png" width="48" height="48" alt="LUX vêtements — logo luxe métallique avec couronne et monogramme" />
        <span>LUX</span> vêtements
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#home" id="navHome">Accueil</a></li>
        <li><a href="produits.html" id="navShop">Boutique</a></li>
        <li><a href="index.html#categories" id="navCategories">Catégories</a></li>
        <li><a href="index.html#contact" id="navContact">Contact</a></li>
        <li><a href="produits.html" id="btnAllProducts">Voir tous les produits</a></li>
      </ul>
      <div class="nav-actions">
        <div class="lang-dropdown">
          <button type="button" class="lang-toggle" id="langToggleBtn">Français</button>
          <div class="lang-menu" id="langMenu">
            <button type="button" class="lang-option" data-lang="fr" id="langOptionFr">Français</button>
            <button type="button" class="lang-option" data-lang="ar" id="langOptionAr">العربية</button>
          </div>
        </div>
        <a class="cart-btn" href="produits.html">
          <span id="cartLabelText">Panier</span>
        </a>
      </div>
    </div>
  </header>

  <main class="product-page-main container" id="productRoot">
    <p style="margin: 24px 0;"><a href="produits.html" id="backLink" class="btn btn-outline" style="display: inline-flex">Retour à la boutique</a></p>
    <div class="product-detail-grid">
      <div>
        <div class="main-image-box">
          <img id="detailMainImage" src="" alt="" />
        </div>
        <div class="gallery" id="detailGallery"></div>
      </div>
      <div class="details-content">
        <h1 id="detailName">—</h1>
        <div class="details-price" id="detailPrice">0 DT</div>
        <span class="badge details-category" id="detailCategory"></span>
        <div class="detail-tag-text" id="detailTagText"></div>
        <p id="detailDescription"></p>

        <div class="option-group">
          <span class="option-label" id="labelColor">Couleur</span>
          <div class="option-buttons" id="colorOptions"></div>
        </div>
        <div class="option-group" id="usaGroup">
          <span class="option-label" id="labelSizeUsa">Taille USA</span>
          <div class="option-buttons" id="sizeOptionsUsa"></div>
        </div>
        <div class="option-group" id="eurGroup">
          <span class="option-label" id="labelSizeEur">Taille EUR</span>
          <div class="option-buttons" id="sizeOptionsEur"></div>
        </div>

        <div class="stock-msg" id="stockMsg" aria-live="polite"></div>

        <div class="order-panel">
          <div class="error-text" id="selectionError"></div>
          <button type="button" class="btn btn-primary" id="addToCartBtn">Ajouter au panier</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      LUX vêtements — © <span id="year"></span>
    </div>
  </footer>

  <script type="module" src="js/product-page.js"></script>
</body>
</html>
